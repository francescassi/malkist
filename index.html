<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.2)), url('IMG_4030.jpeg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    overflow: hidden;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

.not-loaded * {
    animation-play-state: paused !important;
}

.page {
    display: none;
    padding: 20px;
    width: 100%;
    box-sizing: border-box;
    z-index: 10;
    position: relative;
}

.active { display: block; }

.flowers {
    position: absolute;
    bottom: 15%;
    left: 50%;
    transform: translateX(-50%) scale(0.6);
    z-index: 1;
    pointer-events: none;
}

h1 { font-size: 28px; margin: 10px 0; font-weight: 700; text-shadow: 0 2px 4px rgba(255,255,255,0.8); }
p { font-size: 15px; line-height: 1.5; margin: 8px 0; }
img { max-width: 220px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

button {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 25px;
    background: #2f3442;
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.emoji, .confetti { position: fixed; z-index: 100; pointer-events: none; }

@keyframes fall { to { transform: translateY(110vh); } }

.letterWrap {
    max-width: 90%;
    margin: 15px auto;
    text-align: left;
    background: rgba(255,255,255,0.75);
    padding: 20px;
    border-radius: 18px;
    backdrop-filter: blur(5px);
    max-height: 55vh;
    overflow-y: auto;
}

#letterBox { line-height: 1.8; font-size: 14px; color: #444; }
.highlight { background: rgba(255, 107, 181, 0.3); padding: 0 2px; }
</style>
</head>

<body class="not-loaded">

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="page active">
    <div class="flowers">
        <div class="flower flower--1">
            <div class="flower__leafs flower__leafs--1">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>
    </div>

    <h1>HAPPY BIRTHDAYY<br>MY MALKIST<br>໒꒰ྀིᵔ ᵕ ᵔ ꒱ྀི১</h1>
    <p style="font-size: 13px; opacity: 0.8;">there's more waiting... click to find out ✨</p>
    <button onclick="startAll()">tap &lt;3</button>
</div>

<div class="page">
    <img src="cute.gif">
    <p>kamuu udah berusaha lebih baik untuk setiap tahunnya yaa.<br>keren sekaliieee, aku banggaaa ♡</p>
    <button onclick="nextPage()">open it &lt;3</button>
</div>

<div class="page">
    <h1>HAPPYY<br>BIRTHDAYY GANTENGKU<br>SAYANGG</h1>
    <div class="letterWrap">
        <div id="letterBox"></div>
    </div>
    <p style="font-size: 12px;">— from pacar xiao 🧸</p>
</div>

<script>
window.onload = () => {
    setTimeout(() => {
        document.body.classList.remove("not-loaded");
    }, 500);
};

let pages = document.querySelectorAll(".page");
let current = 0;

function startAll() {
    let audio = document.getElementById("music");
    audio.play().catch(() => {});
    nextPage();
}

function nextPage() {
    pages[current].classList.remove("active");
    current++;
    if (current >= pages.length) current = pages.length - 1;
    pages[current].classList.add("active");
    if (current === (pages.length - 1)) restartLetterTyping();
}

const emojis = ["💗","🎀","🧸","💞"];
setInterval(() => {
    let e = document.createElement("div");
    e.className = "emoji";
    e.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    e.style.left = Math.random() * 100 + "vw";
    e.style.top = "-20px";
    e.style.fontSize = (Math.random() * 20 + 10) + "px";
    e.style.animation = `fall ${Math.random() * 3 + 4}s linear forwards`;
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 7000);
}, 500);

const letterHTML = `bub.<br><br>Today is your day... <span class="highlight">you are always enough.</span><br><br>I hope life treats you gently.<br><br>Happy birthday.`;

function restartLetterTyping() {
    const box = document.getElementById("letterBox");
    box.innerHTML = "";
    let i = 0;
    function step() {
        box.innerHTML = letterHTML.slice(0, i);
        i++;
        if (i < letterHTML.length) setTimeout(step, 30);
    }
    step();
}
</script>
</body>
</html>
