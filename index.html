<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }
:root { --dark-color: #000; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('IMG_4030.jpeg');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    overflow: hidden;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    perspective: 1000px;
}

.not-loaded * { animation-play-state: paused !important; }

.page {
    display: none;
    padding: 20px;
    width: 100%;
    z-index: 100;
    position: relative;
}

.active { display: block; }

.flowers { position: absolute; bottom: 5vh; left: 50%; transform: translateX(-50%) scale(0.6); }
.flower { position: absolute; bottom: 10vmin; transform-origin: bottom center; z-index: 10; --fl-speed: 0.8s; }
.flower--1 { animation: moving-flower-1 4s linear infinite; }
.flower--1 .flower__line { height: 70vmin; animation-delay: 0.3s; }
.flower--2 { left: 50%; transform: rotate(30deg); animation: moving-flower-2 4s linear infinite; }
.flower--2 .flower__line { height: 60vmin; animation-delay: 0.8s; }
.flower--3 { left: 50%; transform: rotate(-15deg); animation: moving-flower-3 4s linear infinite; }
.flower__leafs { position: relative; animation: blooming-flower 2s backwards; }
.flower__leaf { position: absolute; bottom: 0; left: 50%; width: 8vmin; height: 11vmin; border-radius: 51% 49% 47% 53%/44% 45% 55% 69%; background-color: #65e6cc; background-image: linear-gradient(to top, #40bbab, #a7ffee); transform-origin: bottom center; opacity: 0.9; box-shadow: inset 0 0 2vmin rgba(255, 255, 255, 0.5); }
.flower__line { height: 55vmin; width: 1.5vmin; background-image: linear-gradient(to top, transparent 10%, #14757a, #39c6d6); animation: grow-flower-tree 4s backwards; }
.flower__white-circle { position: absolute; left: -3.5vmin; top: -3vmin; width: 9vmin; height: 4vmin; border-radius: 50%; background-color: #fff; }

.flower__light { position: absolute; bottom: 0vmin; width: 1vmin; height: 1vmin; background-color: #fffb00; border-radius: 50%; filter: blur(0.2vmin); animation: light-ans 4s linear infinite backwards; }
.flower__grass { --c: #159faa; --line-w: 1.5vmin; position: absolute; bottom: 12vmin; left: -7vmin; display: flex; flex-direction: column; align-items: flex-end; z-index: 20; transform-origin: bottom center; transform: rotate(-48deg) rotateY(40deg); }
.flower__grass--1 { animation: moving-grass 2s linear infinite; }
.flower__grass--top { width: 7vmin; height: 10vmin; border-top-right-radius: 100%; border-right: var(--line-w) solid var(--c); transform: rotate(-2deg); }
.flower__grass--bottom { margin-top: -2px; width: var(--line-w); height: 25vmin; background-image: linear-gradient(to top, transparent, var(--c)); }

@keyframes blooming-flower { 0% { transform: scale(0); } }
@keyframes grow-flower-tree { 0% { height: 0; } }
@keyframes moving-flower-1 { 0%, 100% { transform: rotate(2deg); } 50% { transform: rotate(-2deg); } }
@keyframes moving-flower-2 { 0%, 100% { transform: rotate(18deg); } 50% { transform: rotate(14deg); } }
@keyframes moving-flower-3 { 0%, 100% { transform: rotate(-18deg); } 50% { transform: rotate(-20deg) rotateY(-10deg); } }
@keyframes light-ans { 0% { opacity: 0; transform: translateY(0vmin); } 100% { transform: translateY(-30vmin); opacity: 0; } }
@keyframes moving-grass { 0%, 100% { transform: rotate(-48deg) rotateY(40deg); } 50% { transform: rotate(-50deg) rotateY(40deg); } }

h1 { font-size: 30px; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
button { padding: 12px 30px; border: none; border-radius: 25px; background: #fff; color: #000; font-weight: 700; cursor: pointer; position: relative; z-index: 150; }
.emoji { position: fixed; z-index: 200; pointer-events: none; }
@keyframes fall { to { transform: translateY(110vh); } }
.letterWrap { max-width: 90%; margin: 20px auto; background: rgba(255,255,255,0.9); color: #333; padding: 20px; border-radius: 15px; text-align: left; max-height: 50vh; overflow-y: auto; }
</style>
</head>
<body class="not-loaded">
<audio id="music" loop><source src="music.mp3" type="audio/mpeg"></audio>

<div class="page active">
    <div class="flowers">
        <div class="flower flower--1">
            <div class="flower__leafs">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
                <div class="flower__light flower__light--1"></div>
                <div class="flower__light flower__light--2"></div>
            </div>
            <div class="flower__line"></div>
        </div>
        <div class="flower flower--2">
            <div class="flower__leafs">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>
        <div class="flower flower--3">
            <div class="flower__leafs">
                <div class="flower__leaf flower__leaf--1"></div>
                <div class="flower__leaf flower__leaf--2"></div>
                <div class="flower__leaf flower__leaf--3"></div>
                <div class="flower__leaf flower__leaf--4"></div>
                <div class="flower__white-circle"></div>
            </div>
            <div class="flower__line"></div>
        </div>
        <div class="flower__grass flower__grass--1">
            <div class="flower__grass--top"></div>
            <div class="flower__grass--bottom"></div>
        </div>
    </div>
    <h1>HAPPY BIRTHDAYY<br>MY MALKIST<br>໒꒰ྀིᵔ ᵕ ᵔ ꒱ྀི১</h1>
    <button onclick="startAll()">tap &lt;3</button>
</div>

<div class="page">
    <div class="letterWrap"><div id="letterBox"></div></div>
</div>

<script>
window.onload = () => {
    setTimeout(() => { document.body.classList.remove("not-loaded"); }, 1000);
};

let pages = document.querySelectorAll(".page");
let current = 0;

function startAll() {
    document.getElementById("music").play().catch(()=>{});
    nextPage();
}

function nextPage() {
    pages[current].classList.remove("active");
    current++;
    if (current >= pages.length) current = pages.length - 1;
    pages[current].classList.add("active");
    if (current === 1) restartLetterTyping();
}

setInterval(() => {
    let e = document.createElement("div");
    e.className = "emoji"; e.innerText = "🌸";
    e.style.left = Math.random() * 100 + "vw"; e.style.top = "-20px";
    e.style.animation = `fall ${Math.random() * 3 + 4}s linear forwards`;
    document.body.appendChild(e);
    setTimeout(() => e.remove(), 7000);
}, 500);

function restartLetterTyping() {
    const box = document.getElementById("letterBox");
    const txt = "Happy birthday bub! Today is your day. You are always enough, and I hope life treats you gently. Thank you for being you. 💗";
    let i = 0;
    function step() {
        box.innerHTML = txt.slice(0, i);
        i++;
        if (i <= txt.length) setTimeout(step, 50);
    }
    step();
}
</script>
</body>
</html>
